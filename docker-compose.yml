version: "3.9"

services:
  python-service:
    build: ./python-service
    container_name: gruve-embeddings
    ports:
      - "8001:8001"
    environment:
      - EMBEDDING_SERVICE_PORT=8001

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gruve-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
      - PYTHON_EMBEDDING_SERVICE_URL=http://python-service:8001
      - MCP_SERVER_ENTRY=/app/mcp-server/dist/index.js
    depends_on:
      - python-service
    volumes:
      - backend-data:/app/backend/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gruve-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  backend-data:
